name: CI

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:

jobs:
  tests:
    name: Tests
    runs-on: ubuntu-latest
    services:
      clamav:
        image: clamav/clamav:1.4
        ports:
          - 3310:3310

    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Wait for clamd
        run: |
          for i in $(seq 1 120); do
            result=$(echo PING | nc -w1 localhost 3310 2>/dev/null)
            if [ "$result" = "PONG" ]; then
              echo "clamd ready"
              exit 0
            fi
            sleep 1
          done
          echo "clamd never became ready" && exit 1

      - name: Run tests
        run: APP_CONFIG=config.CiConfig python -m unittest tests -f
