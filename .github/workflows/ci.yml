name: CI

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - name: Install dependencies
        run: uv sync --frozen
      - name: ruff check
        run: uv run ruff check .
      - name: ruff format --check
        run: uv run ruff format --check .

  audit:
    name: Dependency audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - name: Install dependencies
        run: uv sync --frozen
      - name: pip-audit
        run: uv run pip-audit

  tests:
    name: Tests
    runs-on: ubuntu-latest
    services:
      clamav:
        image: clamav/clamav:1.4
        ports:
          - 3310:3310

    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen

      - name: Wait for clamd
        run: |
          for i in $(seq 1 120); do
            result=$(echo PING | nc -w1 localhost 3310 2>/dev/null)
            if [ "$result" = "PONG" ]; then
              echo "clamd ready"
              exit 0
            fi
            sleep 1
          done
          echo "clamd never became ready" && exit 1

      - name: Run tests
        run: APP_CONFIG=config.CiConfig uv run pytest
