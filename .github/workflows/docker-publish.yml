name: Build and Push Container Image

"on":
  workflow_call:
    inputs:
      registry:
        type: string
        required: false
        default: ghcr.io
      image_name:
        # Optional component suffix. Empty (default) publishes the image under
        # the bare repository name, e.g. ghcr.io/<owner>/<repo>.
        type: string
        required: false
        default: ""
      context:
        type: string
        required: true
      target:
        type: string
        required: false
        default: ""

jobs:
  docker-build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ inputs.registry }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ inputs.registry }}/${{ github.repository }}${{ inputs.image_name != '' && format('-{0}', inputs.image_name) || '' }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
      - name: Generate platform-specific tags
        id: platform-tags
        run: |
          AMD64_TAGS=$(echo "${{ steps.meta.outputs.tags }}" | sed 's/$/-amd64/')
          ARM64_TAGS=$(echo "${{ steps.meta.outputs.tags }}" | sed 's/$/-arm64/')
          {
            echo "amd64<<EOF"
            echo "$AMD64_TAGS"
            echo "EOF"
            echo "arm64<<EOF"
            echo "$ARM64_TAGS"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
      - name: Build and push (amd64)
        uses: docker/build-push-action@v6
        with:
          context: ${{ inputs.context }}
          target: ${{ inputs.target }}
          platforms: linux/amd64
          provenance: false
          tags: ${{ steps.platform-tags.outputs.amd64 }}
          labels: ${{ steps.meta.outputs.labels }}
          # Force Docker manifest v2 schema so HEALTHCHECK (a Docker
          # extension, not in the OCI spec) survives into the published
          # image config. Without this, buildx emits OCI mediatypes and
          # the Healthcheck field is stripped at push time.
          outputs: type=image,oci-mediatypes=false,push=true
      - name: Build and push (arm64)
        uses: docker/build-push-action@v6
        with:
          context: ${{ inputs.context }}
          target: ${{ inputs.target }}
          platforms: linux/arm64
          provenance: false
          tags: ${{ steps.platform-tags.outputs.arm64 }}
          labels: ${{ steps.meta.outputs.labels }}
          outputs: type=image,oci-mediatypes=false,push=true
      - name: Create multi-arch manifests
        id: create-manifest
        # Pass the tag list through env: so bash receives it as data, not as
        # code — inlining ${{ steps.meta.outputs.tags }} directly into the
        # `run:` body lets any shell metacharacters in a tag execute at
        # expansion time (pre-hardening, GHA-injection pattern).
        env:
          META_TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          readarray -t TAGS <<< "$META_TAGS"
          FIRST_TAG=""
          for tag in "${TAGS[@]}"; do
            [ -z "$tag" ] && continue
            docker buildx imagetools create \
              --annotation "index:org.opencontainers.image.title=file-scanner" \
              -t "$tag" "${tag}-amd64" "${tag}-arm64"
            [ -z "$FIRST_TAG" ] && FIRST_TAG="$tag"
          done
          if [ -n "$FIRST_TAG" ]; then
            DIGEST="sha256:$(docker buildx imagetools inspect "$FIRST_TAG" --raw | sha256sum | awk '{print $1}')"
            echo "digest=$DIGEST" >> "$GITHUB_OUTPUT"
          fi
      # - name: Generate artifact attestation
      #   uses: actions/attest-build-provenance@v2
      #   with:
      #     subject-name: ${{ inputs.registry }}/${{ github.repository }}-${{ inputs.image_name }}
      #     subject-digest: ${{ steps.create-manifest.outputs.digest }}
      #     push-to-registry: true
      - name: Delete all untagged container images
        uses: actions/delete-package-versions@v5
        with:
          package-name: ${{ github.event.repository.name }}${{ inputs.image_name != '' && format('-{0}', inputs.image_name) || '' }}
          package-type: 'container'
          min-versions-to-keep: 0
          delete-only-untagged-versions: true
