services:
  nginx:
    image: nginx:stable-alpine
    volumes:
      - ./docker/default-nginx-site.conf:/etc/nginx/conf.d/default.conf
    ports:
      - 3320:80
    depends_on:
      - clamav_rest

  clamav_rest:
    build: .
    volumes:
      - ./:/srv/clamav-rest
    depends_on:
      clamd:
        condition: service_healthy
    environment:
      - APP_CONFIG=config.TestConfig

  clamd:
    image: clamav/clamav:1.4
    ports:
      - 3310:3310
    volumes:
      - clamav_data:/var/lib/clamav
    healthcheck:
      test: ["CMD", "clamdscan", "--ping", "1"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 120s

volumes:
  clamav_data:
