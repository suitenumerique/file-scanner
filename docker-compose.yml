services:
  clamav_rest:
    build: .
    volumes:
      - ./:/srv/clamav-rest
    ports:
      - 8090:8090
    depends_on:
      clamd:
        condition: service_healthy
      db:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      - APP_CONFIG=config.TestConfig
      - DATABASE_URL=postgresql://clamav:clamav@db:5432/clamav
      - REDIS_URL=redis://redis:6379/0

  celery_worker:
    build: .
    command: celery -A tasks:celery_app worker --loglevel=info --concurrency=2
    volumes:
      - ./:/srv/clamav-rest
    depends_on:
      clamd:
        condition: service_healthy
      db:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      - APP_CONFIG=config.TestConfig
      - DATABASE_URL=postgresql://clamav:clamav@db:5432/clamav
      - REDIS_URL=redis://redis:6379/0

  clamd:
    image: clamav/clamav:1.4
    ports:
      - 3310:3310
    volumes:
      - clamav_data:/var/lib/clamav
    healthcheck:
      test: ["CMD", "clamdscan", "--ping", "1"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 120s

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: clamav
      POSTGRES_PASSWORD: clamav
      POSTGRES_DB: clamav
    ports:
      - 5432:5432
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U clamav"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - 6379:6379

volumes:
  clamav_data:
  pg_data:
