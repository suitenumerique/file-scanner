services:
  clamav_rest:
    build: .
    volumes:
      - ./:/srv/clamav-rest
      - scan_data:/srv/scan
    ports:
      - 8090:8090
    depends_on:
      clamd:
        condition: service_healthy
      clamav_redis:
        condition: service_started
    environment:
      - APP_CONFIG=config.TestConfig
      - SCAN_DIR=/srv/scan

  celery_worker:
    build: .
    command: celery -A tasks:celery_app worker --loglevel=info --concurrency=2
    volumes:
      - ./:/srv/clamav-rest
      - scan_data:/srv/scan
    depends_on:
      clamd:
        condition: service_healthy
      clamav_redis:
        condition: service_started
    environment:
      - APP_CONFIG=config.TestConfig
      - SCAN_DIR=/srv/scan

  clamd:
    image: clamav/clamav:1.4
    ports:
      - 3310:3310
    volumes:
      - clamav_data:/var/lib/clamav
      - scan_data:/srv/scan
    healthcheck:
      test: ["CMD", "clamdscan", "--ping", "1"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 120s

  # Celery broker only — the service is otherwise stateless (async results are
  # pushed via webhook, nothing is persisted).
  clamav_redis:
    image: redis:7-alpine
    ports:
      - 6380:6379

volumes:
  clamav_data:
  scan_data:
